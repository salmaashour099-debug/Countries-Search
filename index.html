<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="countries.css">

</head>
<body>
    <div class="container py-5 ">
        <div class="card shadow  text-center mx-auto w-75 " style="max-width: 1200px;">
            <div class="card-header bg-primary text-white">
                <h1 class="">Countries</h1>
            </div>

            <form class="card-body">
                <div class="input-group">
                    <input type="text" class="form-control" id="countryName" placeholder="Country Name">
                    <button class="btn btn-primary" type="button" id="search">Search</button>
                </div>
            </form>

    

            <div id="countryInfo" class="country-info m-3">

            </div>

        </div>
    </div>

    <script src="countries.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
